<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5eb0ff"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6ee7b7"/>
      <stop offset="1" stop-color="#2fbf8f"/>
    </linearGradient>
  </defs>

  <!-- background tile -->
  <rect width="512" height="512" rx="104" fill="#ffffff"/>

  <!-- headphone band -->
  <path d="M100 296 v-32 a156 156 0 0 1 312 0 v32"
        fill="none" stroke="#1c2740" stroke-width="34" stroke-linecap="round"/>

  <!-- ear cups -->
  <rect x="54"  y="234" width="74" height="126" rx="34" fill="#1c2740"/>
  <rect x="384" y="234" width="74" height="126" rx="34" fill="#1c2740"/>
  <path d="M112 258 a44 52 0 0 1 0 78" fill="none" stroke="#41527a" stroke-width="7" stroke-linecap="round"/>
  <path d="M400 258 a44 52 0 0 0 0 78" fill="none" stroke="#41527a" stroke-width="7" stroke-linecap="round"/>

  <!-- waveform left (blue) -->
  <g fill="#3b82f6">
    <rect x="132" y="355" width="9" height="14" rx="4.5"/>
    <rect x="148" y="338" width="9" height="48" rx="4.5"/>
    <rect x="164" y="324" width="9" height="76" rx="4.5"/>
    <rect x="180" y="344" width="9" height="36" rx="4.5"/>
    <rect x="196" y="332" width="9" height="60" rx="4.5"/>
  </g>

  <!-- waveform right (green) -->
  <g fill="#34d399">
    <rect x="307" y="332" width="9" height="60" rx="4.5"/>
    <rect x="323" y="344" width="9" height="36" rx="4.5"/>
    <rect x="339" y="324" width="9" height="76" rx="4.5"/>
    <rect x="355" y="338" width="9" height="48" rx="4.5"/>
    <rect x="371" y="355" width="9" height="14" rx="4.5"/>
  </g>

  <!-- blue speech bubble (happy) -->
  <g>
    <circle cx="188" cy="236" r="74" fill="url(#blue)"/>
    <path d="M148 294 l-20 38 46 -15 z" fill="#2f6fe4"/>
    <path d="M152 209 a19 11 0 0 1 28 -2" fill="none" stroke="#12233f" stroke-width="9" stroke-linecap="round"/>
    <path d="M204 207 a19 11 0 0 1 28 2" fill="none" stroke="#12233f" stroke-width="9" stroke-linecap="round"/>
    <circle cx="166" cy="232" r="9.5" fill="#12233f"/>
    <circle cx="216" cy="232" r="9.5" fill="#12233f"/>
    <path d="M164 258 a28 22 0 0 0 54 0 z" fill="#12233f"/>
  </g>

  <!-- green speech bubble (surprised) -->
  <g>
    <circle cx="330" cy="242" r="66" fill="url(#green)"/>
    <path d="M368 296 l20 36 -46 -13 z" fill="#2fae84"/>
    <path d="M296 216 a17 10 0 0 1 26 -3" fill="none" stroke="#123028" stroke-width="8" stroke-linecap="round"/>
    <path d="M342 212 a17 10 0 0 1 26 3" fill="none" stroke="#123028" stroke-width="8" stroke-linecap="round"/>
    <circle cx="308" cy="242" r="8.5" fill="#123028"/>
    <circle cx="350" cy="240" r="8.5" fill="#123028"/>
    <ellipse cx="330" cy="272" rx="9" ry="11" fill="#123028"/>
  </g>

  <!-- microphone -->
  <g>
    <rect x="230" y="298" width="52" height="96" rx="26" fill="#1c2740"/>
    <g stroke="#f5f7fb" stroke-width="7" stroke-linecap="round">
      <line x1="242" y1="324" x2="270" y2="324"/>
      <line x1="242" y1="340" x2="270" y2="340"/>
      <line x1="242" y1="356" x2="270" y2="356"/>
    </g>
    <path d="M214 356 v10 a42 42 0 0 0 84 0 v-10"
          fill="none" stroke="#1c2740" stroke-width="13" stroke-linecap="round"/>
    <rect x="251" y="412" width="10" height="24" fill="#1c2740"/>
    <rect x="228" y="436" width="56" height="11" rx="5.5" fill="#1c2740"/>
  </g>
</svg>
